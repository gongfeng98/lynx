ReloadBundleEntry:
  x-type: 'pipeline'
  x-name:
    - 'reloadBundleFromNative'
    - 'reloadBundleFromBts'
  allOf:
    - $ref: 'PipelineEntry.yml#/PipelineEntry'
    - type: object
      properties:
        reloadBundleStart:
          type: number
        reloadBundleEnd:
          type: number
        reloadBackgroundStart:
          type: number
        reloadBackgroundEnd:
          type: number
        ffiStart:
          type: number
          required: false
        ffiEnd:
          type: number
          required: false
        createLynxStart:
          type: number
        createLynxEnd:
          type: number
        loadCoreStart:
          type: number
        loadCoreEnd:
          type: number
        openTime:
          type: number
        containerInitStart:
          type: number
        containerInitEnd:
          type: number
        prepareTemplateStart:
          type: number
        prepareTemplateEnd:
          type: number
        fcp:
          $ref: 'PerformanceMetric.yml#/PerformanceMetric'
          x-optional: true
        lynxFcp:
          $ref: 'PerformanceMetric.yml#/PerformanceMetric'
        totalFcp:
          $ref: 'PerformanceMetric.yml#/PerformanceMetric'
          x-optional: true
